.btn-sm{padding:3px 8px;border-radius:11px;font-size:10px;font-weight:600;cursor:pointer;border:1.5px solid}

.lbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.row-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.footer-bar{padding:7px 12px;background:#f8fafc;border-top:1px solid #f1f5f9;font-size:10px;color:#64748b;display:flex;justify-content:space-between}
.legend{margin-top:9px;padding:7px 12px;background:#fff;border-radius:7px;border:1px solid #e2e8f0;font-size:9px;color:#94a3b8;line-height:1.9}
input[type=date]{padding:2px 4px;border-radius:4px;border:1px solid #e2e8f0;font-size:10px;cursor:pointer;width:108px;color:#64748b;background:#fff;font-family:inherit}
input[type=date].has-date{border-color:#a7f3d0;background:#f0fdf4;color:#065f46}
select.fsel{padding:3px 7px;border-radius:6px;border:1px solid #e2e8f0;font-size:10px;color:#334155;background:#fff;cursor:pointer}
input.fsearch{padding:3px 8px;border-radius:6px;border:1px solid #e2e8f0;font-size:10px;color:#334155;flex:1;min-width:180px}
.divider{width:1px;height:36px;background:#e2e8f0;flex-shrink:0}
.mono{font-family:monospace;font-size:10px}

function processOrder(o){
  const fu=FU[o.pedido.trim()]||null;
  // NF e data NF sempre do follow-up; fallback para nulo
  const receive_pd = fu?.receive_pd || null;
  const nf       = fu?.nf       || null;
  const rec_sm   = o.rec_sm || null;
  const dias_sm  = (rec_sm && receive_pd)
    ? Math.round((parseLocal(receive_pd)-parseLocal(rec_sm))/86400000) : null;
  const has_nf   = !!nf;
  const dt_nf    = fu?.inv_date || null;
  const shipping = fu?.shipping || null;
  const fu_delivery=fu?.delivery||null;
  const local_raw=(fu?.dest&&fu.dest.trim())||o.local_entrega||"";
  const fu_found=!!fu;

  const isFOB=o.frete_tipo==="FOB";
  const totvs_flag=!local_raw&&!fu_found;
  const state=extractState(local_raw)||(fu?.uf&&fu.uf!=""?fu.uf:null);
  const stateNotFound=!totvs_flag&&!isFOB&&!state;

  let prazo=null;
  if(!totvs_flag&&!isFOB&&state&&FRETE[o.origem])prazo=FRETE[o.origem][state]??null;

  const base_date=shipping||dt_nf;
  let previsao=null;
  if(has_nf&&base_date&&prazo!=null)previsao=addDays(base_date,prazo);

  const d=previsao?diff(previsao):null;

  const fase=!has_nf?"sem_nf":!dt_nf?"sem_dt_nf":!shipping?"coletado_nao":"em_transito";

  let status;
  if(totvs_flag)      status="TOTVS";
  else if(!has_nf)    status="SEM_NF";
  else if(isFOB)      status="FOB";
  else if(stateNotFound)status="SEM_ESTADO";
  else if(!dt_nf)     status="SEM_DATA_NF";
  else if(prazo==null)status="SEM_PRAZO";
  else if(d<0)        status="ATRASADO";
  else                status="NO_PRAZO";

  return{...o,nf,has_nf,dt_nf,shipping,receive_pd,rec_sm,dias_sm,local_entrega:local_raw,totvs_flag,state,prazo,previsao,diff:d,status,fase,fu_delivery,fu_found};
}

  {label:"Próx. semana",  start:addD(m,7),   end:addD(m,13)},
  {label:"Semana +2",     start:addD(m,14),  end:addD(m,20)},
  {label:"Semana +3",     start:addD(m,21),  end:addD(m,27)},
  {label:"Próx. 30 dias", start:TODAY,       end:addD(TODAY,30)},
  {label:"Atrasados",     overdue:true},
];})();

const COLS=[
  {label:"Embarque",     col:"origem"},
  {label:"Receive PD",  col:"receive_pd"},
  {label:"SM→PD",      col:"dias_sm"},
  {label:"Pedido",       col:"pedido"},
  {label:"Cliente",      col:null},
  {label:"Diretoria",    col:"diretoria"},
  {label:"Vendedor",     col:"vendedor"},
  {label:"NF",           col:null},
  {label:"Data NF",      col:"dt_nf"},
  {label:"Shipping",     col:"shipping"},
  {label:"Fase",         col:null},
  {label:"UF",           col:null},
  {label:"Prazo",        col:null},
  {label:"Prev.Entrega", col:"previsao"},
  {label:"Dias rest.",   col:"diff"},
  {label:"Status",       col:"status"},
  {label:"Data Entrega", col:null},
];

function App(){
  const[dirF,setDirF]=useState("TODOS");
  const[stF,setStF]=useState("TODOS");
  const[wkF,setWkF]=useState(null);
  const[sit,setSit]=useState("PENDENTES");
  const[q,setQ]=useState("");
  const[sc,setSc]=useState("origem");
  const[asc,setAsc]=useState(true);
  const[del,setDel]=useState({});

  useEffect(()=>{
    try{const r=localStorage.getItem("liv_del_2026");if(r)setDel(JSON.parse(r));}catch{}
  },[]);

  const setDate=(ped,date)=>{
    setDel(prev=>{
      const u=date?{...prev,[ped]:date}:(()=>{const n={...prev};delete n[ped];return n;})();
      try{localStorage.setItem("liv_del_2026",JSON.stringify(u));}catch{}
      return u;
    });
  };

  const orders=useMemo(()=>BASE.map(o=>{
    const k=o.pedido.trim();
    const dataE=del[k]||o.fu_delivery||null;
    const ent=!!dataE;
    return{...o,entregue:ent,dataEntregue:dataE,status:ent?"ENTREGUE":o.status};
  }),[del]);

  const dirs=useMemo(()=>["TODOS",...[...new Set(orders.map(o=>o.diretoria))].sort()],[orders]);

  const sorted=useMemo(()=>{
    const list=orders.filter(o=>{
      if(sit==="PENDENTES"&&o.entregue)return false;
      if(sit==="CONCLUIDOS"&&!o.entregue)return false;
      if(dirF!=="TODOS"&&o.diretoria!==dirF)return false;
      if(stF!=="TODOS"&&o.status!==stF)return false;
      if(q){const lq=q.toLowerCase();if(!o.pedido.toLowerCase().includes(lq)&&!o.cliente.toLowerCase().includes(lq)&&!(o.nf||"").toLowerCase().includes(lq))return false;}
      if(wkF!=null){
        const wk=WEEKS[wkF];
        if(wk.overdue){if(o.status!=="ATRASADO")return false;}
        else if(wk.start&&wk.end){if(!o.previsao)return false;const pv=parseLocal(o.previsao);if(pv<wk.start||pv>wk.end)return false;}
      }
      return true;
    });
    return[...list].sort((a,b)=>{
      if(["previsao","diff","dt_nf","shipping","receive_pd","dias_sm"].includes(sc)){
        const g=o=>sc==="previsao"?(o.previsao?parseLocal(o.previsao).getTime():Infinity):sc==="diff"?(o.diff??Infinity):sc==="dt_nf"?(o.dt_nf?parseLocal(o.dt_nf).getTime():Infinity):sc==="receive_pd"?(o.receive_pd?parseLocal(o.receive_pd).getTime():Infinity):sc==="dias_sm"?(o.dias_sm??Infinity):(o.shipping?parseLocal(o.shipping).getTime():Infinity);
        return asc?g(a)-g(b):g(b)-g(a);
      }
      const va=String(a[sc]||""),vb=String(b[sc]||"");
      return asc?va.localeCompare(vb):vb.localeCompare(va);
    });
  },[orders,sit,dirF,stF,q,wkF,sc,asc]);

  const hs=col=>{if(sc===col)setAsc(a=>!a);else{setSc(col);setAsc(true);}};
  const Ico=({col})=>sc===col?<span style={{marginLeft:2,fontSize:9}}>{asc?"▲":"▼"}</span>:<span style={{marginLeft:2,fontSize:9,opacity:.2}}>⇅</span>;

  const kpis=useMemo(()=>{
    const b=dirF==="TODOS"?orders:orders.filter(o=>o.diretoria===dirF);
    return{total:b.length,atrasado:b.filter(o=>o.status==="ATRASADO").length,noPrazo:b.filter(o=>o.status==="NO_PRAZO").length,entregue:b.filter(o=>o.entregue).length,transito:b.filter(o=>!o.entregue&&o.fase==="em_transito").length,semNf:b.filter(o=>o.status==="SEM_NF").length};
  },[orders,dirF]);

  const stOpts=["TODOS","ATRASADO","NO_PRAZO","SEM_NF","FOB","TOTVS","SEM_DATA_NF","SEM_ESTADO","ENTREGUE"];

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#0f172a",padding:"12px 20px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:5,height:24,background:"#06b6d4",borderRadius:3}}/>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:14}}>Livoltek — Acompanhamento de Entregas 2026</div>
          <div style={{color:"#64748b",fontSize:10}}>Hoje: {fmt(TODAY)} · Prazos em dias corridos · NF e datas: Follow-up Solar (aba 2025, PO TOTVS) · Previsão = Shipping (ou Data NF) + prazo frete</div>
        </div>
      </div>

      <div style={{padding:"12px 20px"}}>
        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:7,marginBottom:12}}>
          {[{l:"Total",v:kpis.total,c:"#0f172a"},{l:"🔴 Atrasados",v:kpis.atrasado,c:"#dc2626"},{l:"🟢 No prazo",v:kpis.noPrazo,c:"#16a34a"},{l:"🚚 Em trânsito",v:kpis.transito,c:"#0369a1"},{l:"✅ Entregues",v:kpis.entregue,c:"#059669"},{l:"🟠 Sem NF",v:kpis.semNf,c:"#ea580c"}].map((k,i)=>(
            <div key={i} className="kpi"><div className="kpi-lbl">{k.l}</div><div className="kpi-val" style={{color:k.c}}>{k.v}</div></div>
          ))}
        </div>

        {/* Filtros principais */}
        <div className="panel">
          <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
            {/* Situação */}
            <div>
              <div className="lbl">Situação</div>
              <div style={{display:"flex",gap:5}}>
                {[{k:"PENDENTES",l:"⏳ Pendentes",c:"#b45309"},{k:"CONCLUIDOS",l:"✅ Concluídos",c:"#065f46"},{k:"TODOS",l:"Todos",c:"#0f172a"}].map(({k,l,c})=>(
                  <button key={k} className="btn" onClick={()=>setSit(k)} style={{borderColor:sit===k?c:"#e2e8f0",background:sit===k?c:"#fff",color:sit===k?"#fff":"#475569"}}>{l}</button>
                ))}
              </div>
            </div>
            <div className="divider"/>
            {/* Período */}
            <div>
              <div className="lbl">📅 Período de entrega</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <button className="btn-wk" onClick={()=>setWkF(null)} style={{borderColor:wkF===null?"#0f172a":"#e2e8f0",background:wkF===null?"#0f172a":"#fff",color:wkF===null?"#fff":"#475569"}}>Todos</button>
                {WEEKS.map((w,i)=>(
                  <button key={i} className="btn-wk" onClick={()=>setWkF(wkF===i?null:i)} style={{borderColor:wkF===i?(w.overdue?"#dc2626":"#0284c7"):"#e2e8f0",background:wkF===i?(w.overdue?"#dc2626":"#0284c7"):"#fff",color:wkF===i?"#fff":"#475569"}}>{w.label}</button>
                ))}
              </div>
            </div>
          </div>
        </div>

        {/* Filtros secundários */}
        <div className="row-filters">
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {dirs.map(d=>(
              <button key={d} className="btn-sm" onClick={()=>setDirF(d)} style={{borderColor:dirF===d?(DIR_C[d]||"#0f172a"):"#e2e8f0",background:dirF===d?(DIR_C[d]||"#0f172a"):"#fff",color:dirF===d?"#fff":"#475569"}}>{d}</button>
            ))}
          </div>
          <select className="fsel" value={stF} onChange={e=>setStF(e.target.value)}>
            {stOpts.map(s=><option key={s} value={s}>{s==="TODOS"?"Todos os status":S_CFG[s]?.label||s}</option>)}
          </select>
          <input className="fsearch" value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar pedido, NF ou cliente..."/>
        </div>

        {/* Tabela */}
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:9,overflow:"hidden"}}>
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  {COLS.map(({label,col})=>(
                    <th key={label} className={col?"s"+(sc===col?" active":""):""} onClick={col?()=>hs(col):undefined}>
                      {label}{col&&<Ico col={col}/>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.map((o,i)=>{
                  const k=o.pedido.trim();
                  const cfg=S_CFG[o.status]||S_CFG.SEM_PRAZO;
                  const fc=F_CFG[o.fase]||{};
                  const dc=o.diff==null?"#94a3b8":o.diff<0?"#dc2626":o.diff<=3?"#d97706":"#16a34a";
                  const rc=o.entregue?"r-del":i%2===0?"r-odd":"r-even";
                  return(
                    <tr key={k+i} className={rc}>
                      {/* Embarque */}
                      <td><span className="pill" style={{background:o.origem==="CWB"?"#dbeafe":o.origem==="MAN"?"#d1fae5":"#fef3c7",color:o.origem==="CWB"?"#1d4ed8":o.origem==="MAN"?"#065f46":"#92400e"}}>{o.origem}</span></td>
                      <td style={{whiteSpace:"nowrap",fontSize:10,color:o.receive_pd?"#334155":"#94a3b8",fontWeight:o.receive_pd?500:400}}>{o.receive_pd?fmt(o.receive_pd):"—"}</td>
                      {/* ⏱ SM - dias entre recebimento SM e Receive PD */}
                      <td style={{textAlign:"center"}}>
                        {o.dias_sm!=null
                          ? <span title={`SM recebeu em ${fmt(o.rec_sm)} · PD recebeu em ${fmt(o.receive_pd)}`}
                              style={{fontWeight:700,fontSize:10,padding:"2px 6px",borderRadius:5,cursor:"default",
                                background:o.dias_sm<=2?"#f0fdf4":o.dias_sm<=5?"#fefce8":"#fef2f2",
                                color:o.dias_sm<=2?"#166534":o.dias_sm<=5?"#713f12":"#991b1b"}}>
                              {o.dias_sm}d
                            </span>
                          : <span style={{color:"#94a3b8",fontSize:10}}>—</span>}
                      </td>
                      {/* Pedido */}
                      <td className="mono" style={{fontWeight:600,color:"#0f172a",whiteSpace:"nowrap"}}>{k}</td>
                      {/* Cliente */}
                      <td style={{color:"#334155",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={o.cliente}>{o.cliente}</td>
                      {/* Diretoria */}
                      <td><span className="badge" style={{background:(DIR_C[o.diretoria]||"#6b7280")+"22",color:DIR_C[o.diretoria]||"#6b7280"}}>{o.diretoria}</span></td>
                      {/* Vendedor */}
                      <td style={{color:"#64748b",whiteSpace:"nowrap",fontSize:10}}>{o.vendedor}</td>
                      {/* NF */}
                      <td style={{fontWeight:o.has_nf?600:400,color:o.has_nf?"#15803d":"#dc2626",whiteSpace:"nowrap"}}>
                        {o.nf||"—"}
                        {o.fu_found&&<span title="fonte: follow-up" style={{marginLeft:2,fontSize:9,color:"#0ea5e9"}}>↗</span>}
                      </td>
                      {/* Data NF */}
                      <td style={{color:"#64748b",whiteSpace:"nowrap",fontSize:10}}>{fmt(o.dt_nf)}</td>
                      {/* Shipping */}
                      <td style={{whiteSpace:"nowrap",fontSize:10,color:o.shipping?"#0369a1":"#94a3b8",fontWeight:o.shipping?600:400}}>
                        {o.shipping?fmt(o.shipping):<span style={{fontSize:9}}>Não coletado</span>}
                      </td>
                      {/* Fase */}
                      <td>{!o.entregue&&fc.label&&<span className="fbadge" style={{background:fc.bg,color:fc.color}}>{fc.label}</span>}</td>
                      {/* UF */}
                      <td style={{textAlign:"center",fontWeight:600,fontSize:11,color:"#334155"}}>
                        {o.status==="SEM_ESTADO"?<span style={{color:"#f59e0b",fontSize:9}}>⚠N/I</span>:(o.state||"—")}
                      </td>
                      {/* Prazo */}
                      <td style={{textAlign:"center",color:"#334155",fontSize:10}}>{o.prazo!=null?`${o.prazo}d`:"—"}</td>
                      {/* Previsão */}
                      <td style={{whiteSpace:"nowrap",fontWeight:600,fontSize:10,color:o.previsao?(diff(o.previsao)<0?"#dc2626":diff(o.previsao)<=3?"#d97706":"#15803d"):"#94a3b8"}}>{fmt(o.previsao)}</td>
                      {/* Dias */}
                      <td style={{textAlign:"center"}}>
                        {o.entregue
                          ? (() => {
                              if(!o.dataEntregue||!o.previsao) return <span style={{color:"#059669",fontSize:11}}>✓</span>;
                              const dp=Math.round((parseLocal(o.dataEntregue)-parseLocal(o.previsao))/86400000);
                              return dp<=0
                                ? <span style={{fontWeight:700,fontSize:10,padding:"1px 5px",borderRadius:5,background:"#f0fdf4",color:"#166534"}}>✓ {dp===0?"no prazo":`${Math.abs(dp)}d antes`}</span>
                                : <span style={{fontWeight:700,fontSize:10,padding:"1px 5px",borderRadius:5,background:"#fef2f2",color:"#991b1b"}}>+{dp}d atraso</span>;
                            })()
                          : o.diff!=null
                            ? <span style={{fontWeight:700,fontSize:11,color:dc}}>{o.diff<0?`${o.diff}d`:`+${o.diff}d`}</span>
                            : "—"}
                      </td>
                      {/* Status */}
                      <td><span className="badge" style={{background:cfg.bg,color:cfg.color}}><span className="dot" style={{background:cfg.dot}}/>{cfg.label}</span></td>
                      {/* Data Entrega */}
                      <td>
                        <input type="date" value={o.dataEntregue||""} min="2026-01-01" max="2026-12-31"
                          className={o.dataEntregue?"has-date":""}
                          onChange={e=>setDate(k,e.target.value||null)}/>
                      </td>
                    </tr>
                  );
                })}
                {!sorted.length&&<tr><td colSpan={17} style={{padding:28,textAlign:"center",color:"#94a3b8"}}>Nenhum pedido encontrado</td></tr>}
              </tbody>
            </table>
          </div>
          <div className="footer-bar">
            <span>{sorted.length} pedido(s) · <span style={{color:"#0ea5e9"}}>↗</span> = dado do Follow-up Solar (aba 2025)</span>
            <span style={{color:"#94a3b8"}}>datas de entrega salvas no navegador</span>
          </div>
        </div>

        {/* Legenda */}
        <div className="legend">
          <b>Lógica de prazo:</b> Shipping coletado → prazo conta a partir da coleta · Sem shipping → conta a partir da Data NF &nbsp;|&nbsp;
          <b>Status:</b>{" "}
          {Object.entries(S_CFG).map(([k,v])=>(
            <span key={k} style={{marginRight:8}}><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:v.dot,marginRight:2,verticalAlign:"middle"}}/>{v.label}</span>
          ))}&nbsp;|&nbsp;
          <b>⚠ N/I</b> = UF não identificada automaticamente
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
