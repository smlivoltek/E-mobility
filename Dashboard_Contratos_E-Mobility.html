<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Contratos - Mobility 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        /* TOPO - Visão Executiva */
        .executive-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-executive {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid #3498db;
        }

        .kpi-executive.revenue { border-left-color: #27ae60; }
        .kpi-executive.meta { border-left-color: #e74c3c; }
        .kpi-executive.ticket { border-left-color: #9b59b6; }
        .kpi-executive.entrega { border-left-color: #f39c12; }

        .kpi-exec-label {
            font-size: 0.75rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-exec-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .kpi-exec-subtitle {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* MEIO - Análise por Cliente */
        .clients-analysis {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .clients-analysis h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 600;
        }

        .client-row {
            display: grid;
            grid-template-columns: 150px 1fr 120px 120px;
            gap: 15px;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #f8f9fa;
            align-items: center;
        }

        .client-name {
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .client-revenue {
            font-size: 1.3rem;
            font-weight: 700;
            color: #27ae60;
        }

        .client-participation {
            text-align: right;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .client-growth {
            text-align: right;
            font-weight: 600;
        }

        .client-growth.positive { color: #27ae60; }
        .client-growth.negative { color: #e74c3c; }

        /* Gráficos */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .chart-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        /* Alertas */
        .alerts-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .alerts-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .alert-item {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .alert-item.critical {
            background: #ffe8e8;
            border-left: 3px solid #e74c3c;
        }

        .alert-item.warning {
            background: #fff8e1;
            border-left: 3px solid #f39c12;
        }

        .alert-item.info {
            background: #e3f2fd;
            border-left: 3px solid #3498db;
        }

        /* Operacional */
        .operational-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .op-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .op-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ecf0f1;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-name {
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .product-value {
            font-weight: 600;
            color: #27ae60;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #95a5a6;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .client-row {
                grid-template-columns: 1fr;
                text-align: left;
            }
            
            .executive-kpis {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard de Contratos - Mobility 2026</h1>
            <p>Visão Executiva e Operacional</p>
        </div>

        <div id="loading" class="loading">Carregando dados...</div>
        <div id="content" style="display: none;">
            <!-- TOPO: Visão Executiva -->
            <div class="executive-kpis" id="exec-kpis"></div>

            <!-- MEIO: Análise por Cliente -->
            <div class="clients-analysis">
                <h2>📊 Análise por Cliente</h2>
                <div id="clients-rows"></div>
            </div>

            <!-- Gráficos -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Evolução Mensal - Faturamento</h3>
                    <canvas id="evolutionChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Participação por Cliente</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <!-- Alertas -->
            <div class="alerts-section">
                <h3>⚠️ Alertas e Gargalos</h3>
                <div id="alerts-container"></div>
            </div>

            <!-- Operacional -->
            <div class="operational-section">
                <div class="op-card">
                    <h3>🏆 Top 3 Produtos (Receita)</h3>
                    <div id="top-products"></div>
                </div>
                <div class="op-card">
                    <h3>📦 Estoque Crítico</h3>
                    <div id="critical-stock"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '10ziICWxJTYYR_dNIvtr5gu1FEO8MT1aZTiLjWcPcZZE';
        const GID = '1899085269'; // BASE_UNIFICADA
        const GID_ESTOQUE = '1628316734'; // Estoque
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        const CSV_ESTOQUE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_ESTOQUE}`;

        const META_TOTAL = 12000000; // R$ 12 milhões (GWM + Renault)

        const clientIcons = {
            'GWM': '🚗',
            'RENAULT': '🚙',
            'TC': '🚐'
        };

        let estoqueData = [];

        let charts = {};

        function colToIndex(col) {
            let index = 0;
            for (let i = 0; i < col.length; i++) {
                index = index * 26 + (col.charCodeAt(i) - 'A'.charCodeAt(0) + 1);
            }
            return index - 1;
        }

        const COL = {
            CONTRATO: colToIndex('BN'),
            CLIENTE: colToIndex('N'),
            STATUS: colToIndex('BJ'),
            PRODUTO: colToIndex('AG'),
            QUANTIDADE: colToIndex('AJ'),
            VALOR_TOTAL: colToIndex('AL'),
            DATA_PEDIDO: colToIndex('C'),
            DATA_FATURAMENTO: colToIndex('BG')
        };

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                data.push(values);
            }
            
            return data;
        }

        function parseValor(str) {
            if (!str) return 0;
            return parseFloat(str.toString().replace(/[^\d,-]/g, '').replace(',', '.')) || 0;
        }

        function parseData(str) {
            if (!str || str === 'nan') return null;
            try {
                const d = new Date(str);
                return isNaN(d.getTime()) ? null : d;
            } catch {
                return null;
            }
        }

        async function loadData() {
            try {
                // Buscar dados de contratos
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                console.log('✅ Contratos - Linhas carregadas:', data.length);
                
                // Buscar estoque
                const responseEstoque = await fetch(CSV_ESTOQUE_URL);
                const csvEstoque = await responseEstoque.text();
                const dataEstoque = parseCSV(csvEstoque);
                
                console.log('✅ Estoque - Linhas carregadas:', dataEstoque.length);
                
                processEstoque(dataEstoque);
                processData(data);
                
            } catch (error) {
                console.error('❌ Erro:', error);
                useSampleData();
            }
        }

        function useSampleData() {
            const sampleData = {
                totalReceita: 450000,
                totalPedidos: 10,
                ticketMedio: 45000,
                percentualEntregue: 30,
                clientes: {
                    'GWM': { receita: 250000, pedidos: 5, entregue: 1, transito: 1, pendente: 3, participacao: 55.6 },
                    'RENAULT': { receita: 150000, pedidos: 3, entregue: 1, transito: 1, pendente: 1, participacao: 33.3 },
                    'TC': { receita: 50000, pedidos: 2, entregue: 2, transito: 0, pendente: 0, participacao: 11.1 }
                },
                evolucaoMensal: [
                    { mes: 'Jan', valor: 0 },
                    { mes: 'Fev', valor: 250000 },
                    { mes: 'Mar', valor: 150000 },
                    { mes: 'Abr', valor: 50000 }
                ],
                topProdutos: [
                    { nome: 'CC 60kW MF', receita: 180000 },
                    { nome: 'CC 120kW MF', receita: 150000 },
                    { nome: 'CC 30kW MC', receita: 120000 }
                ]
            };
            
            renderDashboard(sampleData);
        }

        function processEstoque(rawData) {
            estoqueData = [];
            
            rawData.forEach(row => {
                const bomId = (row[0] || '').toString().trim(); // Coluna A = BOM ID
                const descricao = (row[2] || '').toString().trim(); // Coluna C = Descrição
                const disponivel = parseInt(row[13]) || 0; // Coluna N = DISPONIVEL
                const totvs = parseInt(row[8]) || 0; // Coluna I = TOTAL (TOTVS)
                
                // Só adicionar se disponível <= 0 (crítico)
                if (bomId && disponivel <= 0) {
                    estoqueData.push({
                        produto: bomId,
                        nome: descricao.substring(0, 30), // Resumir nome
                        disponivel,
                        totvs
                    });
                }
            });
            
            // Ordenar por mais crítico (mais negativo)
            estoqueData.sort((a, b) => a.disponivel - b.disponivel);
            
            // Pegar top 5 mais críticos
            estoqueData = estoqueData.slice(0, 5);
            
            console.log('📦 Estoque crítico:', estoqueData.length, 'itens');
        }

        function processData(rawData) {
            const dadosContrato = rawData.filter(row => {
                const contrato = (row[COL.CONTRATO] || '').toString().toUpperCase().trim();
                return contrato === 'SIM' || contrato === 'S';
            });
            
            console.log('📋 Registros com contrato:', dadosContrato.length);
            
            if (dadosContrato.length === 0) {
                useSampleData();
                return;
            }
            
            let totalReceita = 0;
            let totalPedidosFaturados = 0;
            let totalEntregue = 0;
            let totalPedidos = 0;
            const clientes = {};
            const produtosReceita = {};
            const evolucaoPorMes = {};
            const pedidosUnicos = new Set();
            
            dadosContrato.forEach(row => {
                const cliente = (row[COL.CLIENTE] || '').toString().trim();
                const status = (row[COL.STATUS] || '').toString().toUpperCase().trim();
                const produto = (row[COL.PRODUTO] || '').toString().trim();
                const valor = parseValor(row[COL.VALOR_TOTAL]);
                const dataFat = parseData(row[COL.DATA_FATURAMENTO]);
                const dataPedido = parseData(row[COL.DATA_PEDIDO]);
                
                let clienteNome = cliente.toUpperCase();
                if (clienteNome.includes('GWM') || clienteNome.includes('DIMAS')) {
                    clienteNome = 'GWM';
                } else if (clienteNome.includes('RENAULT')) {
                    clienteNome = 'RENAULT';
                } else if (clienteNome.includes('TC') || clienteNome.includes('TRITEC')) {
                    clienteNome = 'TC';
                } else {
                    return;
                }
                
                if (!clientes[clienteNome]) {
                    clientes[clienteNome] = {
                        receita: 0,
                        pedidos: 0,
                        pedidosFaturados: 0,
                        entregue: 0,
                        transito: 0,
                        pendente: 0,
                        receitaPorMes: {}
                    };
                }
                
                // Contar pedidos únicos
                const pedidoId = `${clienteNome}-${dataPedido?.getTime()}-${valor}`;
                if (!pedidosUnicos.has(pedidoId)) {
                    clientes[clienteNome].pedidos += 1;
                    totalPedidos += 1;
                    pedidosUnicos.add(pedidoId);
                }
                
                // 🔥 CORREÇÃO 1: SÓ CONTAR RECEITA SE FATURADO/ENTREGUE
                const isFaturado = status.includes('FATURADO') || status.includes('ENTREGUE') || 
                                  status.includes('CONCLUÍ') || status.includes('DELIVERED');
                
                if (isFaturado) {
                    clientes[clienteNome].receita += valor;
                    clientes[clienteNome].pedidosFaturados += 1;
                    totalReceita += valor;
                    totalPedidosFaturados += 1;
                    
                    // 🔥 CORREÇÃO 3: EVOLUÇÃO MENSAL CONFIÁVEL (YYYY-MM)
                    if (dataFat) {
                        const mesChave = `${dataFat.getFullYear()}-${String(dataFat.getMonth() + 1).padStart(2, '0')}`;
                        evolucaoPorMes[mesChave] = (evolucaoPorMes[mesChave] || 0) + valor;
                        clientes[clienteNome].receitaPorMes[mesChave] = 
                            (clientes[clienteNome].receitaPorMes[mesChave] || 0) + valor;
                    }
                    
                    // Produtos (só faturados)
                    if (produto) {
                        produtosReceita[produto] = (produtosReceita[produto] || 0) + valor;
                    }
                }
                
                // Status (contar todos, não só faturados)
                if (status.includes('ENTREGUE') || status.includes('CONCLUÍ')) {
                    clientes[clienteNome].entregue += 1;
                    totalEntregue += 1;
                } else if (status.includes('TRÂNSIT') || status.includes('TRANSIT')) {
                    clientes[clienteNome].transito += 1;
                } else if (status.includes('PENDENTE') || status.includes('PENDING')) {
                    clientes[clienteNome].pendente += 1;
                }
            });
            
            // Calcular participação
            Object.keys(clientes).forEach(c => {
                clientes[c].participacao = totalReceita > 0 ? (clientes[c].receita / totalReceita * 100) : 0;
            });
            
            // Top produtos
            const topProdutos = Object.entries(produtosReceita)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([nome, receita]) => ({ nome, receita }));
            
            // 🔥 CORREÇÃO 3: ORDENAR EVOLUÇÃO MENSAL CORRETAMENTE
            const evolucaoMensal = Object.entries(evolucaoPorMes)
                .sort((a, b) => a[0].localeCompare(b[0])) // Ordena YYYY-MM
                .map(([mesChave, valor]) => {
                    const [ano, mes] = mesChave.split('-');
                    const mesNome = new Date(parseInt(ano), parseInt(mes) - 1).toLocaleString('pt-BR', { month: 'short' });
                    return { mes: mesNome, mesChave, valor };
                });
            
            // 🔥 CORREÇÃO 4: CALCULAR CRESCIMENTO MÊS ATUAL VS ANTERIOR
            const mesesOrdenados = Object.keys(evolucaoPorMes).sort();
            const mesAtual = mesesOrdenados[mesesOrdenados.length - 1];
            const mesAnterior = mesesOrdenados[mesesOrdenados.length - 2];
            
            Object.keys(clientes).forEach(c => {
                const receitaAtual = clientes[c].receitaPorMes[mesAtual] || 0;
                const receitaAnterior = clientes[c].receitaPorMes[mesAnterior] || 0;
                
                if (receitaAnterior > 0) {
                    clientes[c].crescimento = ((receitaAtual - receitaAnterior) / receitaAnterior * 100);
                } else {
                    clientes[c].crescimento = null;
                }
            });
            
            const dashData = {
                totalReceita,
                totalPedidos,
                // 🔥 CORREÇÃO 2: TICKET MÉDIO SÓ COM FATURADOS
                ticketMedio: totalPedidosFaturados > 0 ? totalReceita / totalPedidosFaturados : 0,
                percentualEntregue: totalPedidos > 0 ? (totalEntregue / totalPedidos * 100) : 0,
                clientes,
                evolucaoMensal,
                topProdutos
            };
            
            console.log('✅ Dados processados:', dashData);
            renderDashboard(dashData);
        }

        function renderDashboard(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            renderExecutiveKPIs(data);
            renderClientsAnalysis(data);
            renderCharts(data);
            renderAlerts(data);
            renderOperational(data);
        }

        function renderExecutiveKPIs(data) {
            const container = document.getElementById('exec-kpis');
            const percentualMeta = (data.totalReceita / META_TOTAL * 100).toFixed(1);
            
            container.innerHTML = `
                <div class="kpi-executive revenue">
                    <div class="kpi-exec-label">Receita Total</div>
                    <div class="kpi-exec-value">R$ ${(data.totalReceita / 1000).toFixed(0)}k</div>
                    <div class="kpi-exec-subtitle">${data.totalPedidos} pedidos</div>
                </div>
                <div class="kpi-executive meta">
                    <div class="kpi-exec-label">Meta Anual</div>
                    <div class="kpi-exec-value">${percentualMeta}%</div>
                    <div class="kpi-exec-subtitle">R$ ${(META_TOTAL / 1000000).toFixed(1)}M de meta</div>
                </div>
                <div class="kpi-executive ticket">
                    <div class="kpi-exec-label">Ticket Médio</div>
                    <div class="kpi-exec-value">R$ ${(data.ticketMedio / 1000).toFixed(0)}k</div>
                    <div class="kpi-exec-subtitle">Por pedido</div>
                </div>
                <div class="kpi-executive entrega">
                    <div class="kpi-exec-label">Taxa de Entrega</div>
                    <div class="kpi-exec-value">${data.percentualEntregue.toFixed(0)}%</div>
                    <div class="kpi-exec-subtitle">Pedidos concluídos</div>
                </div>
            `;
        }

        function renderClientsAnalysis(data) {
            const container = document.getElementById('clients-rows');
            container.innerHTML = '';
            
            ['GWM', 'RENAULT', 'TC'].forEach(cliente => {
                if (!data.clientes[cliente]) return;
                
                const c = data.clientes[cliente];
                const div = document.createElement('div');
                div.className = 'client-row';
                
                let crescimentoHtml = '<div class="client-growth">--</div>';
                if (c.crescimento !== null && c.crescimento !== undefined) {
                    const sinal = c.crescimento >= 0 ? '+' : '';
                    const classe = c.crescimento >= 0 ? 'positive' : 'negative';
                    crescimentoHtml = `<div class="client-growth ${classe}">${sinal}${c.crescimento.toFixed(1)}%</div>`;
                }
                
                div.innerHTML = `
                    <div class="client-name">
                        <span>${clientIcons[cliente]}</span>
                        <span>${cliente}</span>
                    </div>
                    <div class="client-revenue">R$ ${(c.receita / 1000).toFixed(0)}k</div>
                    <div class="client-participation">${c.participacao.toFixed(1)}% do total</div>
                    ${crescimentoHtml}
                `;
                container.appendChild(div);
            });
        }

        function renderCharts(data) {
            // Evolução Mensal
            const ctxEvol = document.getElementById('evolutionChart').getContext('2d');
            if (charts.evolution) charts.evolution.destroy();
            
            charts.evolution = new Chart(ctxEvol, {
                type: 'line',
                data: {
                    labels: data.evolucaoMensal.map(d => d.mes),
                    datasets: [{
                        label: 'Faturamento (R$)',
                        data: data.evolucaoMensal.map(d => d.valor),
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(39, 174, 96, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
            
            // Pizza
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (charts.pie) charts.pie.destroy();
            
            const clientesData = Object.entries(data.clientes);
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: clientesData.map(([nome]) => nome),
                    datasets: [{
                        data: clientesData.map(([, dados]) => dados.receita),
                        backgroundColor: ['#3498db', '#e74c3c', '#9b59b6']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function renderAlerts(data) {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';
            
            Object.entries(data.clientes).forEach(([nome, c]) => {
                const percTransito = c.pedidos > 0 ? (c.transito / c.pedidos * 100) : 0;
                
                if (percTransito > 50) {
                    const div = document.createElement('div');
                    div.className = 'alert-item critical';
                    div.innerHTML = `🔴 <strong>${nome}:</strong> ${percTransito.toFixed(0)}% dos pedidos em trânsito (risco alto)`;
                    container.appendChild(div);
                }
                
                if (c.pendente > 2) {
                    const div = document.createElement('div');
                    div.className = 'alert-item warning';
                    div.innerHTML = `🟡 <strong>${nome}:</strong> ${c.pendente} pedidos pendentes (possível gargalo)`;
                    container.appendChild(div);
                }
            });
            
            if (container.children.length === 0) {
                container.innerHTML = '<div class="alert-item info">✅ Nenhum alerta crítico no momento</div>';
            }
        }

        function renderOperational(data) {
            // Top Produtos
            const topContainer = document.getElementById('top-products');
            topContainer.innerHTML = '';
            data.topProdutos.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="product-name">${i + 1}. ${p.nome}</div>
                    <div class="product-value">R$ ${(p.receita / 1000).toFixed(0)}k</div>
                `;
                topContainer.appendChild(div);
            });
            
            // Estoque Crítico
            const stockContainer = document.getElementById('critical-stock');
            stockContainer.innerHTML = '';
            estoqueData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="product-name">${item.nome}</div>
                    <div class="product-value" style="color: #e74c3c;">${Math.max(0, item.disponivel)} un</div>
                `;
                stockContainer.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
