<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Contratos - Mobility 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        /* TOPO - Visão Executiva */
        .executive-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-executive {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 4px solid #3498db;
        }

        .kpi-executive.revenue { border-left-color: #27ae60; }
        .kpi-executive.meta { border-left-color: #e74c3c; }
        .kpi-executive.ticket { border-left-color: #9b59b6; }
        .kpi-executive.entrega { border-left-color: #f39c12; }

        .kpi-exec-label {
            font-size: 0.75rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-exec-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .kpi-exec-subtitle {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* MEIO - Análise por Cliente */
        .clients-analysis {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .clients-analysis h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: 600;
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .client-card {
            background: white;
            border: 1px solid #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .client-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .client-card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .client-card-units {
            background: #3498db;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .client-card-info {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .client-card-info div {
            margin-bottom: 5px;
        }

        .client-card-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .client-stat {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .client-stat-label {
            font-size: 0.7rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .client-stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .client-stat.entregue .client-stat-value { color: #27ae60; }
        .client-stat.transito .client-stat-value { color: #f39c12; }

        .client-card-chart {
            margin-top: 15px;
        }

        .chart-bars {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .chart-bar-container {
            text-align: center;
        }

        .chart-bar-wrapper {
            height: 100px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 8px;
        }

        .chart-bar {
            width: 50px;
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
        }

        .chart-bar.pendente { background: #bdc3c7; }
        .chart-bar.faturado { background: #34495e; }
        .chart-bar.transito { background: #f39c12; }
        .chart-bar.entregue { background: #27ae60; }

        .chart-bar-label {
            font-size: 0.7rem;
            color: #7f8c8d;
        }

        .chart-bar-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e50;
            margin-top: 5px;
        }

        .products-table {
            margin-top: 15px;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }

        .products-table-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-row-table {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
            align-items: center;
        }

        .product-row-table:first-of-type {
            font-weight: 600;
            color: #7f8c8d;
            border-bottom: 2px solid #ecf0f1;
        }

        .product-row-table:last-of-type {
            border-bottom: none;
        }

        .product-qty {
            text-align: center;
            font-weight: 600;
            color: #3498db;
        }

        .product-meta {
            text-align: center;
            color: #7f8c8d;
        }

        .product-percent {
            text-align: center;
            font-weight: 600;
        }

        .product-percent.no-meta {
            color: #95a5a6;
            font-style: italic;
        }

        .product-percent.achieved {
            color: #27ae60;
        }

        .product-percent.partial {
            color: #f39c12;
        }

        /* Gráficos */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .chart-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        /* Alertas */
        .alerts-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .alerts-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .alert-item {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .alert-item.critical {
            background: #ffe8e8;
            border-left: 3px solid #e74c3c;
        }

        .alert-item.warning {
            background: #fff8e1;
            border-left: 3px solid #f39c12;
        }

        .alert-item.info {
            background: #e3f2fd;
            border-left: 3px solid #3498db;
        }

        /* Operacional */
        .operational-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .op-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .op-card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }

        .product-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #ecf0f1;
        }

        .product-item:last-child {
            border-bottom: none;
        }

        .product-name {
            font-size: 0.85rem;
            color: #2c3e50;
        }

        .product-value {
            font-weight: 600;
            color: #27ae60;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #95a5a6;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .client-row {
                grid-template-columns: 1fr;
                text-align: left;
            }
            
            .executive-kpis {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    </div>

    <script>
        const SHEET_ID = '10ziICWxJTYYR_dNIvtr5gu1FEO8MT1aZTiLjWcPcZZE';
        const GID = '1899085269'; // BASE_UNIFICADA
        const GID_ESTOQUE = '1628316734'; // Estoque
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        const CSV_ESTOQUE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_ESTOQUE}`;

        const META_TOTAL = 12000000; // R$ 12 milhões (GWM + Renault)

        const clientIcons = {
            'GWM': '🚗',
            'RENAULT': '🚙',
            'TC': '🚐'
        };

        const contratoInfo = {
            'GWM': {
                vigencia: '09/02/2025 – Indeterminado',
                status: 'Ativo',
                observacao: 'Fornecimento sob demanda, sem obrigação mínima de volume',
                metasProduto: {} // Sem meta de produto
            },
            'RENAULT': {
                vigencia: '-- à --',
                status: 'Ativo',
                observacao: 'Sem volume mínimo obrigatório',
                metasProduto: {} // Adicionar metas quando disponível
            },
            'TC': {
                vigencia: '-- à --',
                status: 'Ativo',
                observacao: 'Sem volume mínimo obrigatório',
                metasProduto: {} // Adicionar metas quando disponível
            }
        };

        let estoqueData = [];

        let charts = {};

        function colToIndex(col) {
            let index = 0;
            for (let i = 0; i < col.length; i++) {
                index = index * 26 + (col.charCodeAt(i) - 'A'.charCodeAt(0) + 1);
            }
            return index - 1;
        }

        const COL = {
            CONTRATO: colToIndex('BN'),
            CLIENTE: colToIndex('N'),
            STATUS: colToIndex('BJ'),
            PRODUTO: colToIndex('AG'),
            QUANTIDADE: colToIndex('AJ'),
            VALOR_TOTAL: colToIndex('AL'),
            DATA_PEDIDO: colToIndex('C'),
            DATA_FATURAMENTO: colToIndex('BG'),
            NUM_PEDIDO: colToIndex('K')  // ✅ CORRIGIDO: K (não J)
        };

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                data.push(values);
            }
            
            return data;
        }

        function parseValor(str) {
            if (!str) return 0;
            return parseFloat(str.toString().replace(/[^\d,-]/g, '').replace(',', '.')) || 0;
        }

        function parseData(str) {
            if (!str || str === 'nan') return null;
            try {
                const d = new Date(str);
                return isNaN(d.getTime()) ? null : d;
            } catch {
                return null;
            }
        }

        async function loadData() {
            try {
                console.log('🔄 Iniciando carregamento de dados...');
                console.log('📡 URL Contratos:', CSV_URL);
                console.log('📡 URL Estoque:', CSV_ESTOQUE_URL);
                
                // Buscar dados de contratos
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`Erro HTTP contratos: ${response.status}`);
                }
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                console.log('✅ Contratos - Linhas carregadas:', data.length);
                
                // Buscar estoque
                const responseEstoque = await fetch(CSV_ESTOQUE_URL);
                if (!responseEstoque.ok) {
                    console.warn('⚠️ Erro ao carregar estoque:', responseEstoque.status);
                    estoqueData = [];
                } else {
                    const csvEstoque = await responseEstoque.text();
                    const dataEstoque = parseCSV(csvEstoque);
                    console.log('✅ Estoque - Linhas carregadas:', dataEstoque.length);
                    processEstoque(dataEstoque);
                }
                
                processData(data);
                
            } catch (error) {
                console.error('❌ Erro ao carregar dados:', error);
                console.log('⚠️ Carregando dados de exemplo...');
                useSampleData();
            }
        }

        function useSampleData() {
            console.log('⚠️ Usando dados de exemplo');
            
            const sampleData = {
                totalReceita: 450000,
                totalPedidos: 10,
                ticketMedio: 45000,
                percentualEntregue: 30,
                clientes: {
                    'GWM': { 
                        receita: 250000, 
                        pedidos: 5, 
                        unidades: 5,
                        faturado: 5,
                        entregue: 1, 
                        transito: 1, 
                        pendente: 3, 
                        participacao: 55.6,
                        principalProduto: 'CC 60kW MF',
                        produtosPorQtd: {
                            'CC 60kW MF': 3,
                            'CC 120kW MF': 2
                        }
                    },
                    'RENAULT': { 
                        receita: 150000, 
                        pedidos: 3,
                        unidades: 3,
                        faturado: 3,
                        entregue: 1, 
                        transito: 1, 
                        pendente: 1, 
                        participacao: 33.3,
                        principalProduto: 'CC 30kW MC',
                        produtosPorQtd: {
                            'CC 30kW MC': 3
                        }
                    },
                    'TC': { 
                        receita: 50000, 
                        pedidos: 2,
                        unidades: 2,
                        faturado: 2,
                        entregue: 2, 
                        transito: 0, 
                        pendente: 0, 
                        participacao: 11.1,
                        principalProduto: 'CA 22kW ATOM',
                        produtosPorQtd: {
                            'CA 22kW ATOM': 2
                        }
                    }
                },
                evolucaoMensal: [
                    { mes: 'Jan', valor: 0 },
                    { mes: 'Fev', valor: 250000 },
                    { mes: 'Mar', valor: 150000 },
                    { mes: 'Abr', valor: 50000 }
                ],
                topProdutos: [
                    { nome: 'CC 60kW MF', receita: 180000 },
                    { nome: 'CC 120kW MF', receita: 150000 },
                    { nome: 'CC 30kW MC', receita: 120000 }
                ]
            };
            
            renderDashboard(sampleData);
        }

        function processEstoque(rawData) {
            console.log('\n📦 PROCESSANDO ESTOQUE:');
            console.log('  Linhas recebidas:', rawData.length);
            
            estoqueData = [];
            let count = 0;
            
            rawData.forEach((row, index) => {
                const bomId = (row[0] || '').toString().trim(); // Coluna A = BOM ID
                const descricao = (row[2] || '').toString().trim(); // Coluna C = Descrição
                const disponivel = parseInt(row[8]) || 0; // Coluna I = DISPONIVEL ✅
                const reservas = parseInt(row[9]) || 0; // Coluna J = RESERVAS ✅
                const totvs = parseInt(row[8]) || 0; // Coluna I = TOTVS
                
                // Debug primeiras 3 linhas
                if (count < 3) {
                    console.log(`\n  Linha ${index}:`);
                    console.log('    BOM ID (col A):', bomId);
                    console.log('    Descrição (col C):', descricao);
                    console.log('    DISPONIVEL (col I):', disponivel);
                    console.log('    RESERVAS (col J):', reservas);
                    count++;
                }
                
                // Só adicionar se disponível <= 0 (crítico)
                if (bomId && disponivel <= 0) {
                    estoqueData.push({
                        produto: bomId,
                        nome: descricao.substring(0, 30),
                        disponivel,
                        reservas,
                        totvs
                    });
                }
            });
            
            // Ordenar por mais crítico (mais negativo)
            estoqueData.sort((a, b) => a.disponivel - b.disponivel);
            
            // Pegar top 5 mais críticos
            estoqueData = estoqueData.slice(0, 5);
            
            console.log('  ✅ Itens críticos encontrados:', estoqueData.length);
            if (estoqueData.length > 0) {
                console.log('  Top 3 mais críticos:', estoqueData.slice(0, 3));
            } else {
                console.log('  ⚠️ NENHUM item crítico (disponível <= 0)');
            }
        }

        function processData(rawData) {
            const dadosContrato = rawData.filter(row => {
                const contrato = (row[COL.CONTRATO] || '').toString().toUpperCase().trim();
                return contrato === 'SIM' || contrato === 'S';
            });
            
            console.log('📋 Registros com contrato:', dadosContrato.length);
            
            if (dadosContrato.length === 0) {
                useSampleData();
                return;
            }
            
            let totalReceita = 0;
            let totalPedidosFaturados = 0;
            let totalEntregue = 0;
            let totalPedidos = 0;
            const clientes = {};
            const produtosReceita = {};
            const evolucaoPorMes = {};
            const pedidosUnicos = new Set();
            
            // 🔍 DEBUG: Mostrar primeiros 5 pedidos GWM
            console.log('\n🔍 DEBUG - PRIMEIROS PEDIDOS GWM:');
            let gwmCount = 0;
            
            dadosContrato.forEach((row, index) => {
                const cliente = (row[COL.CLIENTE] || '').toString().trim();
                const status = (row[COL.STATUS] || '').toString().trim();
                const produto = (row[COL.PRODUTO] || '').toString().trim();
                const valor = parseValor(row[COL.VALOR_TOTAL]);
                const dataFat = parseData(row[COL.DATA_FATURAMENTO]);
                const dataPedido = parseData(row[COL.DATA_PEDIDO]);
                const numPedido = (row[COL.NUM_PEDIDO] || '').toString().trim();
                
                // 🔍 DEBUG GWM
                if ((cliente.toUpperCase().includes('GWM') || cliente.toUpperCase().includes('DIMAS')) && gwmCount < 5) {
                    console.log(`\n📋 Pedido GWM #${gwmCount + 1}:`);
                    console.log('  Número:', numPedido);
                    console.log('  Cliente:', cliente);
                    console.log('  Status ORIGINAL:', `"${status}"`);
                    console.log('  Produto:', produto);
                    console.log('  Quantidade (col AJ):', row[COL.QUANTIDADE], '→', parseInt(row[COL.QUANTIDADE]) || 0);
                    console.log('  Valor:', valor);
                    console.log('  Data Faturamento:', dataFat);
                    gwmCount++;
                }
                
                let clienteNome = cliente.toUpperCase();
                if (clienteNome.includes('GWM') || clienteNome.includes('DIMAS')) {
                    clienteNome = 'GWM';
                } else if (clienteNome.includes('RENAULT')) {
                    clienteNome = 'RENAULT';
                } else if (clienteNome.includes('TC') || clienteNome.includes('TRITEC')) {
                    clienteNome = 'TC';
                } else {
                    return;
                }
                
                if (!clientes[clienteNome]) {
                    clientes[clienteNome] = {
                        receita: 0,
                        pedidos: 0,
                        pedidosFaturados: 0,
                        unidades: 0,
                        entregue: 0,
                        transito: 0,
                        pendente: 0,
                        faturado: 0,
                        receitaPorMes: {},
                        produtosPorQtd: {}
                    };
                }
                
                // Contar pedidos únicos
                const pedidoId = `${clienteNome}-${numPedido}`;
                if (!pedidosUnicos.has(pedidoId)) {
                    clientes[clienteNome].pedidos += 1;
                    totalPedidos += 1;
                    pedidosUnicos.add(pedidoId);
                }
                
                const statusUpper = status.toUpperCase();
                const isFaturado = statusUpper.includes('FINALIZADO') || 
                                  statusUpper.includes('FATURADO') || 
                                  statusUpper.includes('ENVIADO');
                
                // Contar unidades (quantidade de produtos)
                const quantidade = parseInt(row[COL.QUANTIDADE]) || 0;
                clientes[clienteNome].unidades += quantidade;
                
                // 🔍 LOG de acúmulo de unidades GWM
                if ((cliente.toUpperCase().includes('GWM') || cliente.toUpperCase().includes('DIMAS')) && quantidade > 0) {
                    console.log(`  ➕ Somando ${quantidade} unidades de ${produto} | Total GWM agora: ${clientes['GWM'].unidades}`);
                }
                
                // Rastrear produtos por quantidade
                if (produto) {
                    clientes[clienteNome].produtosPorQtd[produto] = 
                        (clientes[clienteNome].produtosPorQtd[produto] || 0) + quantidade;
                }
                
                if (isFaturado) {
                    clientes[clienteNome].receita += valor;
                    clientes[clienteNome].pedidosFaturados += 1;
                    clientes[clienteNome].faturado += 1;
                    totalReceita += valor;
                    totalPedidosFaturados += 1;
                    
                    if (dataFat) {
                        const mesChave = `${dataFat.getFullYear()}-${String(dataFat.getMonth() + 1).padStart(2, '0')}`;
                        evolucaoPorMes[mesChave] = (evolucaoPorMes[mesChave] || 0) + valor;
                        clientes[clienteNome].receitaPorMes[mesChave] = 
                            (clientes[clienteNome].receitaPorMes[mesChave] || 0) + valor;
                    }
                    
                    if (produto) {
                        produtosReceita[produto] = (produtosReceita[produto] || 0) + valor;
                    }
                }
                
                // Status detalhado
                if (statusUpper.includes('FINALIZADO') || statusUpper.includes('ENVIADO')) {
                    clientes[clienteNome].entregue += 1;
                    totalEntregue += 1;
                } else if (statusUpper.includes('TRÂNSIT') || statusUpper.includes('TRANSIT')) {
                    clientes[clienteNome].transito += 1;
                } else if (statusUpper.includes('PENDENTE')) {
                    clientes[clienteNome].pendente += 1;
                }
            });
            
            console.log('\n✅ RESUMO POR CLIENTE:');
            Object.keys(clientes).forEach(c => {
                // Encontrar principal produto
                const prodEntries = Object.entries(clientes[c].produtosPorQtd);
                if (prodEntries.length > 0) {
                    const [principalProd, qtd] = prodEntries.sort((a, b) => b[1] - a[1])[0];
                    clientes[c].principalProduto = principalProd;
                } else {
                    clientes[c].principalProduto = '--';
                }
                
                console.log(`\n${c}:`);
                console.log('  📦 UNIDADES:', clientes[c].unidades);
                console.log('  Receita:', clientes[c].receita);
                console.log('  Pedidos Total:', clientes[c].pedidos);
                console.log('  Pedidos Faturados:', clientes[c].pedidosFaturados);
                console.log('  Faturado:', clientes[c].faturado);
                console.log('  Entregue:', clientes[c].entregue);
                console.log('  Em Trânsito:', clientes[c].transito);
                console.log('  Pendente:', clientes[c].pendente);
                console.log('  Principal Produto:', clientes[c].principalProduto);
                console.log('  Produtos por quantidade:', clientes[c].produtosPorQtd);
            });
            
            // Calcular participação
            Object.keys(clientes).forEach(c => {
                clientes[c].participacao = totalReceita > 0 ? (clientes[c].receita / totalReceita * 100) : 0;
            });
            
            // Top produtos
            const topProdutos = Object.entries(produtosReceita)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([nome, receita]) => ({ nome, receita }));
            
            // Evolução mensal
            const evolucaoMensal = Object.entries(evolucaoPorMes)
                .sort((a, b) => a[0].localeCompare(b[0]))
                .map(([mesChave, valor]) => {
                    const [ano, mes] = mesChave.split('-');
                    const mesNome = new Date(parseInt(ano), parseInt(mes) - 1).toLocaleString('pt-BR', { month: 'short' });
                    return { mes: mesNome, mesChave, valor };
                });
            
            // Crescimento
            const mesesOrdenados = Object.keys(evolucaoPorMes).sort();
            const mesAtual = mesesOrdenados[mesesOrdenados.length - 1];
            const mesAnterior = mesesOrdenados[mesesOrdenados.length - 2];
            
            Object.keys(clientes).forEach(c => {
                const receitaAtual = clientes[c].receitaPorMes[mesAtual] || 0;
                const receitaAnterior = clientes[c].receitaPorMes[mesAnterior] || 0;
                
                if (receitaAnterior > 0) {
                    clientes[c].crescimento = ((receitaAtual - receitaAnterior) / receitaAnterior * 100);
                } else {
                    clientes[c].crescimento = null;
                }
            });
            
            const dashData = {
                totalReceita,
                totalPedidos,
                ticketMedio: totalPedidosFaturados > 0 ? totalReceita / totalPedidosFaturados : 0,
                percentualEntregue: totalPedidos > 0 ? (totalEntregue / totalPedidos * 100) : 0,
                clientes,
                evolucaoMensal,
                topProdutos
            };
            
            console.log('\n✅ Dados finais processados');
            renderDashboard(dashData);
        }

        function renderDashboard(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            
            renderExecutiveKPIs(data);
            renderClientsAnalysis(data);
            renderCharts(data);
            renderAlerts(data);
            renderOperational(data);
        }

        function renderExecutiveKPIs(data) {
            const container = document.getElementById('exec-kpis');
            const percentualMeta = (data.totalReceita / META_TOTAL * 100).toFixed(1);
            
            container.innerHTML = `
                <div class="kpi-executive revenue">
                    <div class="kpi-exec-label">Receita Total</div>
                    <div class="kpi-exec-value">R$ ${(data.totalReceita / 1000).toFixed(0)}k</div>
                    <div class="kpi-exec-subtitle">${data.totalPedidos} pedidos</div>
                </div>
                <div class="kpi-executive meta">
                    <div class="kpi-exec-label">Meta Anual</div>
                    <div class="kpi-exec-value">${percentualMeta}%</div>
                    <div class="kpi-exec-subtitle">R$ ${(META_TOTAL / 1000000).toFixed(1)}M de meta</div>
                </div>
                <div class="kpi-executive ticket">
                    <div class="kpi-exec-label">Ticket Médio</div>
                    <div class="kpi-exec-value">R$ ${(data.ticketMedio / 1000).toFixed(0)}k</div>
                    <div class="kpi-exec-subtitle">Por pedido</div>
                </div>
                <div class="kpi-executive entrega">
                    <div class="kpi-exec-label">Taxa de Entrega</div>
                    <div class="kpi-exec-value">${data.percentualEntregue.toFixed(0)}%</div>
                    <div class="kpi-exec-subtitle">Pedidos concluídos</div>
                </div>
            `;
        }

        function renderClientsAnalysis(data) {
            const container = document.getElementById('clients-grid');
            container.innerHTML = '';
            
            ['GWM', 'RENAULT', 'TC'].forEach(cliente => {
                if (!data.clientes[cliente]) return;
                
                const c = data.clientes[cliente];
                const info = contratoInfo[cliente];
                const percentEntregue = c.pedidos > 0 ? ((c.entregue / c.pedidos) * 100).toFixed(0) : 0;
                
                // Encontrar altura máxima para escalar barras
                const maxValor = Math.max(c.pendente, c.faturado, c.transito, c.entregue, 1);
                
                // Criar tabela de produtos
                let produtosHtml = '';
                const produtosEntries = Object.entries(c.produtosPorQtd).sort((a, b) => b[1] - a[1]);
                
                if (produtosEntries.length > 0) {
                    produtosHtml = `
                        <div class="products-table">
                            <div class="products-table-title">📊 Análise por Produto</div>
                            <div class="product-row-table">
                                <div>Produto</div>
                                <div style="text-align: center;">Comprado</div>
                                <div style="text-align: center;">Meta</div>
                                <div style="text-align: center;">% Atingido</div>
                            </div>
                    `;
                    
                    produtosEntries.forEach(([produto, qtd]) => {
                        const meta = info.metasProduto[produto] || 0;
                        let percentHtml = '<span class="product-percent no-meta">Sem meta</span>';
                        
                        if (meta > 0) {
                            const percent = ((qtd / meta) * 100).toFixed(0);
                            const classe = percent >= 100 ? 'achieved' : 'partial';
                            percentHtml = `<span class="product-percent ${classe}">${percent}%</span>`;
                        }
                        
                        produtosHtml += `
                            <div class="product-row-table">
                                <div>${produto.substring(0, 30)}</div>
                                <div class="product-qty">${qtd}</div>
                                <div class="product-meta">${meta > 0 ? meta : '--'}</div>
                                <div>${percentHtml}</div>
                            </div>
                        `;
                    });
                    
                    produtosHtml += '</div>';
                }
                
                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-card-header">
                        <div class="client-card-title">
                            <span>${clientIcons[cliente]}</span>
                            <span>${cliente}</span>
                        </div>
                        <div class="client-card-units">${c.unidades} unidades</div>
                    </div>
                    
                    <div class="client-card-info">
                        <div><strong>${cliente}</strong> registrou <strong>${c.unidades} unidades</strong>, sendo <strong>${c.entregue} entregues</strong> e <strong>${c.transito} em trânsito</strong>.</div>
                        <div>Principal produto: <strong>${c.principalProduto}</strong></div>
                    </div>
                    
                    <div class="client-card-stats">
                        <div class="client-stat">
                            <div class="client-stat-label">Faturado</div>
                            <div class="client-stat-value">${c.faturado}</div>
                        </div>
                        <div class="client-stat entregue">
                            <div class="client-stat-label">Entregue</div>
                            <div class="client-stat-value">${c.entregue}</div>
                        </div>
                        <div class="client-stat transito">
                            <div class="client-stat-label">Trânsito</div>
                            <div class="client-stat-value">${c.transito}</div>
                        </div>
                        <div class="client-stat">
                            <div class="client-stat-label">% Entregue</div>
                            <div class="client-stat-value">${percentEntregue}%</div>
                        </div>
                    </div>
                    
                    <div class="client-card-info" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #ecf0f1;">
                        <div><strong>VIGÊNCIA:</strong> ${info.vigencia}</div>
                        <div><strong>STATUS:</strong> ${info.status}</div>
                    </div>
                    
                    <div class="client-card-chart">
                        <div class="chart-bars">
                            <div class="chart-bar-container">
                                <div class="chart-bar-wrapper">
                                    <div class="chart-bar pendente" style="height: ${(c.pendente / maxValor * 100)}px"></div>
                                </div>
                                <div class="chart-bar-label">Pendente</div>
                                <div class="chart-bar-value">${c.pendente}</div>
                            </div>
                            <div class="chart-bar-container">
                                <div class="chart-bar-wrapper">
                                    <div class="chart-bar faturado" style="height: ${(c.faturado / maxValor * 100)}px"></div>
                                </div>
                                <div class="chart-bar-label">Faturado</div>
                                <div class="chart-bar-value">${c.faturado}</div>
                            </div>
                            <div class="chart-bar-container">
                                <div class="chart-bar-wrapper">
                                    <div class="chart-bar transito" style="height: ${(c.transito / maxValor * 100)}px"></div>
                                </div>
                                <div class="chart-bar-label">Em Trânsito</div>
                                <div class="chart-bar-value">${c.transito}</div>
                            </div>
                            <div class="chart-bar-container">
                                <div class="chart-bar-wrapper">
                                    <div class="chart-bar entregue" style="height: ${(c.entregue / maxValor * 100)}px"></div>
                                </div>
                                <div class="chart-bar-label">Entregue</div>
                                <div class="chart-bar-value">${c.entregue}</div>
                            </div>
                        </div>
                    </div>
                    
                    ${produtosHtml}
                    
                    <div style="font-size: 0.8rem; color: #95a5a6; margin-top: 15px; font-style: italic;">
                        ${info.observacao}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderCharts(data) {
            // Evolução Mensal
            const ctxEvol = document.getElementById('evolutionChart').getContext('2d');
            if (charts.evolution) charts.evolution.destroy();
            
            charts.evolution = new Chart(ctxEvol, {
                type: 'line',
                data: {
                    labels: data.evolucaoMensal.map(d => d.mes),
                    datasets: [{
                        label: 'Faturamento (R$)',
                        data: data.evolucaoMensal.map(d => d.valor),
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(39, 174, 96, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
            
            // Pizza
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (charts.pie) charts.pie.destroy();
            
            const clientesData = Object.entries(data.clientes);
            charts.pie = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: clientesData.map(([nome]) => nome),
                    datasets: [{
                        data: clientesData.map(([, dados]) => dados.receita),
                        backgroundColor: ['#3498db', '#e74c3c', '#9b59b6']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function renderAlerts(data) {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';
            
            Object.entries(data.clientes).forEach(([nome, c]) => {
                const percTransito = c.pedidos > 0 ? (c.transito / c.pedidos * 100) : 0;
                
                if (percTransito > 50) {
                    const div = document.createElement('div');
                    div.className = 'alert-item critical';
                    div.innerHTML = `🔴 <strong>${nome}:</strong> ${percTransito.toFixed(0)}% dos pedidos em trânsito (risco alto)`;
                    container.appendChild(div);
                }
                
                if (c.pendente > 2) {
                    const div = document.createElement('div');
                    div.className = 'alert-item warning';
                    div.innerHTML = `🟡 <strong>${nome}:</strong> ${c.pendente} pedidos pendentes (possível gargalo)`;
                    container.appendChild(div);
                }
            });
            
            if (container.children.length === 0) {
                container.innerHTML = '<div class="alert-item info">✅ Nenhum alerta crítico no momento</div>';
            }
        }

        function renderOperational(data) {
            // Top Produtos
            const topContainer = document.getElementById('top-products');
            topContainer.innerHTML = '';
            
            if (data.topProdutos.length === 0) {
                topContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #95a5a6;">Nenhum produto faturado ainda</div>';
            } else {
                data.topProdutos.forEach((p, i) => {
                    const div = document.createElement('div');
                    div.className = 'product-item';
                    div.innerHTML = `
                        <div class="product-name">${i + 1}. ${p.nome}</div>
                        <div class="product-value">R$ ${(p.receita / 1000).toFixed(0)}k</div>
                    `;
                    topContainer.appendChild(div);
                });
            }
            
            // Estoque Crítico
            const stockContainer = document.getElementById('critical-stock');
            stockContainer.innerHTML = '';
            
            if (estoqueData.length === 0) {
                stockContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #27ae60;">✅ Todos os itens com estoque positivo</div>';
            } else {
                estoqueData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'product-item';
                    div.style.flexDirection = 'column';
                    div.style.alignItems = 'flex-start';
                    div.style.padding = '12px';
                    
                    const reservasHtml = item.reservas > 0 
                        ? `<span style="background: #f39c12; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 10px;">📋 ${item.reservas} reservadas</span>`
                        : '';
                    
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                            <div class="product-name">${item.nome}</div>
                            <div class="product-value" style="color: #e74c3c;">${item.disponivel} un</div>
                        </div>
                        ${item.reservas > 0 ? `<div style="margin-top: 5px; width: 100%;">${reservasHtml}</div>` : ''}
                    `;
                    stockContainer.appendChild(div);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
